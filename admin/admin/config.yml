backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "site"
    label: "Site Content"
    files:
      - file: "content/site.json"
        label: "Main Site"
        name: "main"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
